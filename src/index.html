<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/icon.ico" />
    <title>j3Markdown</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        color: #1f2933;
        background: #f8fafc;
        font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
        font-size: 14px;
      }

      .boot-shell {
        display: grid;
        grid-template-rows: 48px 40px minmax(0, 1fr) 28px;
        width: 100%;
        height: 100%;
        min-width: 600px;
        overflow: hidden;
        background: #f8fafc;
      }

      .boot-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 10px;
        border-bottom: 1px solid #cfd6df;
        background: #ffffff;
      }

      .boot-toolbar__group,
      .boot-toolbar__right {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .boot-button,
      .boot-select {
        height: 30px;
        padding: 5px 10px;
        border: 1px solid #b9c3cf;
        border-radius: 6px;
        color: #172033;
        background: #ffffff;
        white-space: nowrap;
      }

      .boot-select {
        width: 122px;
      }

      .boot-label {
        color: #425066;
      }

      .boot-tabs {
        display: flex;
        align-items: end;
        gap: 2px;
        height: 40px;
        min-width: 0;
        padding: 6px 8px 0;
        border-bottom: 1px solid #cfd6df;
        background: #e8edf3;
      }

      .boot-tab {
        display: flex;
        align-items: center;
        width: 180px;
        height: 34px;
        padding: 0 8px;
        border: 1px solid #c2ccd8;
        border-bottom: 0;
        border-radius: 6px 6px 0 0;
        background: #ffffff;
        font-weight: 700;
      }

      .boot-editor {
        min-height: 0;
        background: #ffffff;
      }

      .boot-status {
        display: flex;
        align-items: center;
        gap: 0;
        min-width: 0;
        padding: 0 10px;
        border-top: 1px solid #cfd6df;
        color: #3c4656;
        background: #eef2f6;
      }

      .boot-status__item {
        height: 100%;
        padding: 5px 10px;
        border-right: 1px solid #d7dee7;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="boot-shell" aria-label="j3Markdown">
        <div class="boot-toolbar">
          <div class="boot-toolbar__group">
            <span class="boot-button">New</span>
            <span class="boot-button">Open</span>
            <span class="boot-button">Save</span>
            <span class="boot-button">Save As</span>
          </div>
          <div class="boot-toolbar__right">
            <span class="boot-label">Theme</span>
            <span class="boot-select">Classic</span>
            <span class="boot-label">Lang</span>
            <span class="boot-select">English</span>
            <span class="boot-button">About</span>
          </div>
        </div>
        <div class="boot-tabs">
          <div class="boot-tab">Untitled.md</div>
        </div>
        <section class="boot-editor"></section>
        <footer class="boot-status">
          <span class="boot-status__item">Untitled</span>
          <span class="boot-status__item">Saved</span>
          <span class="boot-status__item">Tabs 1</span>
        </footer>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
